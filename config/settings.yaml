# BM25 Parameters
bm25:
  k1: 1.5
  b: 0.75
  title_weight: 2.5
  section_title_weight: 1.5
  content_weight: 1.0
  min_score: 1.0

# Dense Search
dense:
  model: "bkai-foundation-models/vietnamese-bi-encoder"
  collection_name: "lung_chunks"
  min_vector_score: 0.50
  qdrant_db_path: "data/qdrant_db"

# Hybrid Fusion
fusion:
  rrf_k: 60
  retrieval_top_k: 10
  final_top_k: 3

# Reranker
reranker:
  enabled: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# LLM
llm:
  ollama_url: "http://localhost:11434"
  default_model: "qwen2.5:3b"
  temperature: 0.15
  num_predict: 500
  num_ctx: 4096
  ab_test_enabled: false
  ab_test_model: "llama3.2:3b"
  ab_test_ratio: 0.5

# Chunking
chunking:
  max_tokens: 384
  overlap_tokens: 50
  min_chunk_length: 100

# Cache
cache:
  max_size: 1024
  ttl_seconds: 3600

# Server
server:
  port: 5080
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "http://localhost:5080"
    - "http://127.0.0.1:5080"
